<!DOCTYPE html>
<html>
<head>
    <title>Unit-5 Quiz System</title>
    <style>
        body {
            font-family: Arial;
            background: #ecf0f1;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .header-info {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }

        .hidden {
            display: none;
        }

        #timer {
            color: red;
            font-weight: bold;
            float: right;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<div class="container" id="reg-page">
    <div class="header-info">
        <h2>SRM Institute of Science and Technology</h2>
        <h3>ECE Department</h3>
        <h3>Nanoscale Electronic Devices</h3>
    </div>

    <h2>Unit-5 Quiz</h2>

    <label>Name:</label>
    <input type="text" id="name" style="width:100%; padding:8px;"><br><br>

    <label>Reg No:</label>
    <input type="text" id="reg" style="width:100%; padding:8px;"><br><br>

    <button onclick="startQuiz()">Start Quiz</button>
</div>

<div class="container hidden" id="quiz-page">
    <span id="timer"></span>
    <h3 id="studentInfo"></h3>
    <div id="questions"></div>
</div>

<div class="container hidden" id="result-page">
    <h2>Quiz Completed</h2>
    <div id="result"></div>
</div>

<script src="questions.js"></script>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3rPzjBhTu9jEGQeHqGL4oEXItefVKyqufI9DUPZnCGk30BKlEULocOm0iWV4PKRhznA/exec";

let currentQuestion = 0;
let selectedQuestions = [];
let answers = [];
let timer;
let timeLeft = 20;

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function startQuiz() {
    let name = document.getElementById("name").value.trim();
    let reg = document.getElementById("reg").value.trim();

    if (name === "" || reg === "") {
        alert("Enter Name and Register Number");
        return;
    }

    document.getElementById("studentInfo").innerHTML =
        "<b>Name:</b> " + name + " | <b>Reg No:</b> " + reg;

    selectedQuestions = shuffle([...questions]);
    currentQuestion = 0;
    answers = [];

    document.getElementById("reg-page").classList.add("hidden");
    document.getElementById("quiz-page").classList.remove("hidden");

    showQuestion();
}

function showQuestion() {
    if (currentQuestion >= selectedQuestions.length) {
        submitQuiz();
        return;
    }

    let q = selectedQuestions[currentQuestion];

    let html = `
        <h3>Question ${currentQuestion + 1} / ${selectedQuestions.length}</h3>
        <p><b>${q.q}</b></p>
    `;

    q.a.forEach((opt, index) => {
        html += `<button onclick="selectAnswer(${index})">${opt}</button>`;
    });

    document.getElementById("questions").innerHTML = html;

    timeLeft = 20;
    startTimer();
}

function selectAnswer(index) {
    answers[currentQuestion] = index;
    clearInterval(timer);
    currentQuestion++;
    showQuestion();
}

function startTimer() {
    clearInterval(timer);

    timer = setInterval(() => {
        document.getElementById("timer").innerText =
            "Time Left: " + timeLeft + " sec";

        timeLeft--;

        if (timeLeft < 0) {
            clearInterval(timer);
            currentQuestion++;
            showQuestion();
        }
    }, 1000);
}
function submitQuiz() {
    clearInterval(timer);

    let totalMarks = 0;
    let questionTrackingArray = []; // This will store "Question Text: Mark"

    selectedQuestions.forEach((q, i) => {
        let studentAnswerIndex = answers[i];
        let mark = 0;
        let status = "skipped";

        if (studentAnswerIndex !== undefined && studentAnswerIndex !== null) {
            if (studentAnswerIndex === q.c) {
                mark = 1;
                totalMarks++;
                status = "1";
            } else {
                mark = 0;
                status = "0";
            }
        }

        // Save the Question Text and the result together so you know which is which
        // Example: "What is PCM?: 1"
        questionTrackingArray.push(q.q + " [" + status + "]");
    });

    let name = document.getElementById("name").value;
    let reg = document.getElementById("reg").value;

    fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", 
        body: JSON.stringify({
            name: name,
            reg: reg,
            answers: questionTrackingArray, // Sends actual question text + mark
            marks: totalMarks
        })
    });

    document.getElementById("quiz-page").classList.add("hidden");
    document.getElementById("result-page").classList.remove("hidden");
    document.getElementById("result").innerHTML = `<h3>Score: ${totalMarks} / 20</h3>`;
}
</script>

</body>
</html>
